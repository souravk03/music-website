<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Anshi Music</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #080810;
      --surface: #11111e;
      --surface2: #191929;
      --accent: #a78bfa;
      --accent2: #f472b6;
      --text: #f0effe;
      --muted: #6e6b85;
      --border: rgba(167,139,250,0.12);
      --player-h: 80px;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      padding-bottom: calc(var(--player-h) + 20px);
    }

    .ambient { position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden; }
    .blob { position:absolute;border-radius:50%;filter:blur(80px);opacity:0.16; }
    .blob1 { width:500px;height:500px;top:-150px;left:-150px;background:var(--accent);animation:b1 9s ease-in-out infinite alternate; }
    .blob2 { width:400px;height:400px;bottom:-100px;right:-100px;background:var(--accent2);animation:b2 11s ease-in-out infinite alternate; }
    @keyframes b1{to{transform:translate(100px,80px) scale(1.2);}}
    @keyframes b2{to{transform:translate(-80px,-100px) scale(1.15);}}

    nav {
      position:sticky;top:0;z-index:90;
      display:flex;align-items:center;justify-content:space-between;
      padding:14px 40px;
      background:rgba(8,8,16,0.9);
      backdrop-filter:blur(24px);
      border-bottom:1px solid var(--border);
    }
    .brand {
      font-family:'Playfair Display',serif;font-size:1.4rem;letter-spacing:-0.5px;
      background:linear-gradient(130deg,var(--accent),var(--accent2));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
      white-space:nowrap;
    }
    .brand em { font-style:italic; }
    .search-wrap {
      display:flex;align-items:center;gap:10px;
      background:var(--surface2);border:1px solid var(--border);
      border-radius:30px;padding:9px 18px;flex:1;max-width:360px;margin:0 24px;
      transition:border-color 0.2s;
    }
    .search-wrap:focus-within { border-color:rgba(167,139,250,0.4); }
    .search-wrap input {
      background:none;border:none;outline:none;
      color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.88rem;width:100%;
    }
    .search-wrap input::placeholder { color:var(--muted); }
    .nav-tabs { display:flex;gap:4px; }
    .nav-tab {
      background:none;border:none;color:var(--muted);
      font-family:'DM Sans',sans-serif;font-size:0.85rem;font-weight:500;
      padding:7px 14px;border-radius:20px;cursor:pointer;transition:background 0.2s,color 0.2s;
    }
    .nav-tab:hover { color:var(--text);background:var(--surface2); }
    .nav-tab.active { color:var(--accent);background:rgba(167,139,250,0.1); }

    main { position:relative;z-index:1;padding:32px 40px; }

    .sec { margin-bottom:44px; }
    .sec-head { display:flex;align-items:baseline;justify-content:space-between;margin-bottom:20px; }
    .sec-title { font-family:'Playfair Display',serif;font-size:1.4rem; }
    .sec-title em { color:var(--accent);font-style:italic; }
    .sec-more {
      font-size:0.8rem;color:var(--accent);cursor:pointer;
      background:none;border:none;font-family:'DM Sans',sans-serif;font-weight:500;
    }
    .sec-more:hover { opacity:0.7; }

    .hero-row { display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px; }
    .hero-card {
      border-radius:16px;overflow:hidden;position:relative;
      aspect-ratio:16/9;cursor:pointer;background:var(--surface2);
    }
    .hero-card img {
      width:100%;height:100%;object-fit:cover;
      transition:transform 0.4s,filter 0.3s;filter:brightness(0.65);
    }
    .hero-card:hover img { transform:scale(1.07);filter:brightness(0.45); }
    .hero-card-body {
      position:absolute;inset:0;
      display:flex;flex-direction:column;justify-content:flex-end;padding:16px;
      background:linear-gradient(to top,rgba(8,8,16,0.85) 0%,transparent 60%);
    }
    .hero-card-title { font-weight:600;font-size:0.95rem;line-height:1.3; }
    .hero-card-sub { font-size:0.76rem;color:rgba(240,239,254,0.6);margin-top:3px; }
    .play-overlay {
      position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
      opacity:0;transition:opacity 0.25s;
    }
    .hero-card:hover .play-overlay { opacity:1; }
    .play-circle {
      width:50px;height:50px;border-radius:50%;
      background:var(--accent);display:flex;align-items:center;justify-content:center;
      box-shadow:0 0 32px rgba(167,139,250,0.55);
    }
    .play-circle svg { margin-left:3px; }

    .track-list { display:flex;flex-direction:column;gap:3px; }
    .track-item {
      display:flex;align-items:center;gap:14px;
      padding:10px 12px;border-radius:10px;cursor:pointer;transition:background 0.15s;
    }
    .track-item:hover { background:var(--surface2); }
    .track-item.active { background:rgba(167,139,250,0.1); }
    .track-num { width:24px;text-align:center;font-size:0.8rem;color:var(--muted);flex-shrink:0; }
    .track-item.active .track-num { color:var(--accent); }
    .track-img {
      width:44px;height:44px;border-radius:8px;object-fit:cover;
      flex-shrink:0;background:var(--surface2);
    }
    .track-info { flex:1;min-width:0; }
    .track-name { font-size:0.9rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
    .track-artist { font-size:0.78rem;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
    .track-dur { font-size:0.78rem;color:var(--muted);flex-shrink:0; }
    .track-play-btn {
      width:30px;height:30px;border-radius:50%;
      background:var(--accent);border:none;cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      opacity:0;transition:opacity 0.15s;flex-shrink:0;
    }
    .track-play-btn svg { margin-left:2px; }
    .track-item:hover .track-play-btn,.track-item.active .track-play-btn { opacity:1; }

    .artist-row { display:flex;gap:20px;overflow-x:auto;padding-bottom:12px;scrollbar-width:none; }
    .artist-row::-webkit-scrollbar { display:none; }
    .artist-card { flex-shrink:0;text-align:center;cursor:pointer;transition:transform 0.25s; }
    .artist-card:hover { transform:translateY(-5px); }
    .artist-card img {
      width:90px;height:90px;border-radius:50%;object-fit:cover;
      border:2px solid var(--border);transition:border-color 0.2s;
    }
    .artist-card:hover img { border-color:var(--accent); }
    .artist-card p { margin-top:8px;font-size:0.78rem;color:var(--muted);font-weight:500; }

    .album-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:16px; }
    .album-card {
      background:var(--surface);border:1px solid var(--border);
      border-radius:12px;overflow:hidden;cursor:pointer;
      transition:transform 0.25s,border-color 0.2s;
    }
    .album-card:hover { transform:translateY(-4px);border-color:rgba(167,139,250,0.35); }
    .album-card img { width:100%;aspect-ratio:1;object-fit:cover; }
    .album-card-info { padding:10px 12px 12px; }
    .album-card-name { font-size:0.84rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
    .album-card-artist { font-size:0.74rem;color:var(--muted);margin-top:3px; }

    .loading {
      display:flex;flex-direction:column;align-items:center;
      justify-content:center;gap:12px;padding:40px;
      color:var(--muted);font-size:0.88rem;
    }
    .spinner {
      width:26px;height:26px;border-radius:50%;
      border:2px solid var(--border);border-top-color:var(--accent);
      animation:spin 0.7s linear infinite;
    }
    @keyframes spin { to{transform:rotate(360deg);} }

    #player {
      position:fixed;bottom:0;left:0;right:0;height:var(--player-h);
      background:rgba(8,8,16,0.97);backdrop-filter:blur(30px);
      border-top:1px solid var(--border);z-index:100;
      display:flex;align-items:center;gap:20px;padding:0 32px;
      transform:translateY(100%);transition:transform 0.4s cubic-bezier(0.4,0,0.2,1);
    }
    #player.visible { transform:translateY(0); }
    .player-track { display:flex;align-items:center;gap:12px;min-width:200px;flex:0 0 auto; }
    #player-art { width:48px;height:48px;border-radius:8px;object-fit:cover;background:var(--surface2); }
    #player-name { font-size:0.88rem;font-weight:500; }
    #player-artist { font-size:0.76rem;color:var(--muted);margin-top:2px; }
    .player-controls { flex:1;display:flex;flex-direction:column;align-items:center;gap:8px; }
    .ctrl-btns { display:flex;align-items:center;gap:16px; }
    .ctrl-btn {
      background:none;border:none;cursor:pointer;color:var(--muted);
      transition:color 0.15s;display:flex;align-items:center;justify-content:center;
    }
    .ctrl-btn:hover { color:var(--text); }
    #play-pause-btn {
      width:38px;height:38px;border-radius:50%;background:var(--accent);
      border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;
      transition:opacity 0.15s;
    }
    #play-pause-btn:hover { opacity:0.85; }
    .progress-row { display:flex;align-items:center;gap:10px;width:100%;max-width:500px; }
    #progress-bar {
      flex:1;height:3px;border-radius:2px;
      background:var(--surface2);cursor:pointer;appearance:none;-webkit-appearance:none;
    }
    #progress-bar::-webkit-slider-thumb {
      -webkit-appearance:none;width:12px;height:12px;
      border-radius:50%;background:var(--accent);cursor:pointer;
    }
    #progress-bar::-moz-range-thumb {
      width:12px;height:12px;border-radius:50%;background:var(--accent);border:none;cursor:pointer;
    }
    #time-cur,#time-tot { font-size:0.72rem;color:var(--muted);flex-shrink:0;min-width:28px; }
    #time-tot { text-align:right; }
    .vol-row { display:flex;align-items:center;gap:8px;min-width:120px; }
    #vol-bar { width:80px;height:3px;border-radius:2px;appearance:none;-webkit-appearance:none;background:var(--surface2);cursor:pointer; }
    #vol-bar::-webkit-slider-thumb { -webkit-appearance:none;width:10px;height:10px;border-radius:50%;background:var(--muted);cursor:pointer; }
    #vol-bar::-moz-range-thumb { width:10px;height:10px;border-radius:50%;background:var(--muted);border:none;cursor:pointer; }

    #toast {
      position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);
      background:var(--surface2);border:1px solid var(--border);
      color:var(--text);padding:10px 20px;border-radius:30px;
      font-size:0.82rem;z-index:200;opacity:0;
      transition:opacity 0.3s,transform 0.3s;pointer-events:none;white-space:nowrap;
    }
    #toast.show { opacity:1;transform:translateX(-50%) translateY(0); }

    @media(max-width:700px){
      nav { padding:12px 16px; }
      .nav-tabs { display:none; }
      main { padding:20px 16px; }
      .hero-row { grid-template-columns:1fr; }
      #player { padding:0 16px;gap:12px; }
      .vol-row { display:none; }
      .player-track { min-width:130px; }
    }
  </style>
</head>
<body>

<div class="ambient">
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>
</div>

<nav>
  <div class="brand">Anshi <em>Music</em></div>
  <div class="search-wrap">
    <svg width="14" height="14" fill="none" stroke="var(--muted)" stroke-width="2" viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input type="text" id="search-input" placeholder="Search songs, artists…"/>
  </div>
  <div class="nav-tabs">
    <button class="nav-tab active">Home</button>
    <button class="nav-tab" onclick="loadChart()">Trending</button>
    <button class="nav-tab" onclick="document.getElementById('sec-artists').scrollIntoView({behavior:'smooth'})">Artists</button>
  </div>
</nav>

<main>
  <div class="sec">
    <div class="sec-head">
      <h2 class="sec-title">Trending <em>Tracks</em></h2>
    </div>
    <div class="hero-row" id="trending-hero">
      <div class="loading"><div class="spinner"></div><span>Loading…</span></div>
    </div>
  </div>

  <div class="sec" id="sec-songs">
    <div class="sec-head">
      <h2 class="sec-title" id="songs-title">Top <em>Songs</em></h2>
      <button class="sec-more" onclick="loadMoreTracks()">See more →</button>
    </div>
    <div class="track-list" id="track-list">
      <div class="loading"><div class="spinner"></div><span>Loading…</span></div>
    </div>
  </div>

  <div class="sec" id="sec-artists">
    <div class="sec-head">
      <h2 class="sec-title">Popular <em>Artists</em></h2>
    </div>
    <div class="artist-row" id="artist-row">
      <div class="loading"><div class="spinner"></div><span>Loading…</span></div>
    </div>
  </div>

  <div class="sec">
    <div class="sec-head">
      <h2 class="sec-title">New <em>Albums</em></h2>
    </div>
    <div class="album-grid" id="album-grid">
      <div class="loading"><div class="spinner"></div><span>Loading…</span></div>
    </div>
  </div>
</main>

<div id="player">
  <div class="player-track">
    <img id="player-art" src="" alt=""/>
    <div>
      <div id="player-name">—</div>
      <div id="player-artist">—</div>
    </div>
  </div>
  <div class="player-controls">
    <div class="ctrl-btns">
      <button class="ctrl-btn" id="prev-btn" title="Previous">
        <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
      </button>
      <button id="play-pause-btn" title="Play/Pause">
        <svg id="pp-icon" width="18" height="18" fill="white" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <button class="ctrl-btn" id="next-btn" title="Next">
        <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zm2-8.14 5.51 2.14L8 14.14V9.86zM16 6h2v12h-2z"/></svg>
      </button>
    </div>
    <div class="progress-row">
      <span id="time-cur">0:00</span>
      <input type="range" id="progress-bar" min="0" max="100" value="0"/>
      <span id="time-tot">0:30</span>
    </div>
  </div>
  <div class="vol-row">
    <svg width="14" height="14" fill="var(--muted)" viewBox="0 0 24 24">
      <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
    </svg>
    <input type="range" id="vol-bar" min="0" max="1" step="0.05" value="0.8"/>
  </div>
</div>

<div id="toast"></div>
<audio id="audio"></audio>

<script>
  /* ── iTunes API — no proxy needed, no CORS issues ── */
  const ITUNES = 'https://itunes.apple.com';

  const audio = document.getElementById('audio');
  const player = document.getElementById('player');
  const ppIcon = document.getElementById('pp-icon');
  const progressBar = document.getElementById('progress-bar');
  const timeCur = document.getElementById('time-cur');
  const timeTot = document.getElementById('time-tot');
  const volBar = document.getElementById('vol-bar');

  let queue = [], currentIdx = -1, isPlaying = false;

  const PLAY_SVG = '<path d="M8 5v14l11-7z"/>';
  const PAUSE_SVG = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';

  function fmt(s) {
    s = Math.floor(s||0);
    return Math.floor(s/60) + ':' + (s%60 < 10 ? '0' : '') + (s%60);
  }

  /* Normalize iTunes track to common shape */
  function normalize(t) {
    return {
      id: t.trackId,
      title: t.trackName,
      preview: t.previewUrl,
      duration: Math.round((t.trackTimeMillis||30000)/1000),
      artist: { name: t.artistName },
      album: {
        cover_small: t.artworkUrl60,
        cover_medium: t.artworkUrl100,
        cover_big: (t.artworkUrl100||'').replace('100x100','600x600'),
        title: t.collectionName
      }
    };
  }

  async function itunesSearch(term, limit=25, entity='song') {
    const url = `${ITUNES}/search?term=${encodeURIComponent(term)}&entity=${entity}&limit=${limit}&media=music`;
    const r = await fetch(url);
    const j = await r.json();
    return (j.results||[]).filter(x=>x.previewUrl);
  }

  async function itunesTop(genre='', limit=25) {
    /* Use RSS feed for top charts */
    const feed = genre
      ? `${ITUNES}/rss/topsongs/limit=${limit}/genre=${genre}/json`
      : `${ITUNES}/rss/topsongs/limit=${limit}/json`;
    const r = await fetch(feed);
    const j = await r.json();
    const entries = j?.feed?.entry || [];
    /* Each entry has id, name, artist — need to fetch preview via lookup */
    const ids = entries.map(e => e.id?.attributes?.['im:id']).filter(Boolean).slice(0,limit);
    if (!ids.length) return [];
    const lookup = await fetch(`${ITUNES}/lookup?id=${ids.join(',')}&entity=song`);
    const lj = await lookup.json();
    return (lj.results||[]).filter(x=>x.previewUrl && x.trackName).map(normalize);
  }

  function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove('show'), 2500);
  }

  function playSong(track, list, idx) {
    if (!track.preview) { toast('No preview available for this track'); return; }
    queue = list; currentIdx = idx;
    audio.src = track.preview;
    audio.volume = parseFloat(volBar.value);
    audio.play().then(() => {
      isPlaying = true;
      ppIcon.innerHTML = PAUSE_SVG;
      player.classList.add('visible');
      document.getElementById('player-art').src = track.album?.cover_medium || '';
      document.getElementById('player-name').textContent = track.title;
      document.getElementById('player-artist').textContent = track.artist?.name || '';
      document.querySelectorAll('.track-item').forEach(el => {
        el.classList.toggle('active', el.dataset.id == track.id);
      });
    }).catch(() => toast('Could not play preview'));
  }

  document.getElementById('play-pause-btn').addEventListener('click', () => {
    if (audio.paused) { audio.play(); isPlaying = true; ppIcon.innerHTML = PAUSE_SVG; }
    else { audio.pause(); isPlaying = false; ppIcon.innerHTML = PLAY_SVG; }
  });
  document.getElementById('prev-btn').addEventListener('click', () => {
    if (queue.length && currentIdx > 0) playSong(queue[currentIdx-1], queue, currentIdx-1);
  });
  document.getElementById('next-btn').addEventListener('click', () => {
    if (queue.length && currentIdx < queue.length-1) playSong(queue[currentIdx+1], queue, currentIdx+1);
  });
  audio.addEventListener('timeupdate', () => {
    const pct = audio.duration ? (audio.currentTime / audio.duration) * 100 : 0;
    progressBar.value = pct;
    timeCur.textContent = fmt(audio.currentTime);
    timeTot.textContent = fmt(audio.duration || 30);
  });
  audio.addEventListener('ended', () => {
    if (queue.length && currentIdx < queue.length-1) playSong(queue[currentIdx+1], queue, currentIdx+1);
    else { isPlaying = false; ppIcon.innerHTML = PLAY_SVG; }
  });
  progressBar.addEventListener('input', () => {
    if (audio.duration) audio.currentTime = (progressBar.value / 100) * audio.duration;
  });
  volBar.addEventListener('input', () => { audio.volume = parseFloat(volBar.value); });

  function makeTrackItem(t, list, idx) {
    const div = document.createElement('div');
    div.className = 'track-item';
    div.dataset.id = t.id;
    div.innerHTML = `
      <div class="track-num">${idx+1}</div>
      <img class="track-img" src="${t.album?.cover_small||''}" alt="" loading="lazy"/>
      <div class="track-info">
        <div class="track-name">${t.title}</div>
        <div class="track-artist">${t.artist?.name||''}</div>
      </div>
      <div class="track-dur">${fmt(t.duration)}</div>
      <button class="track-play-btn">
        <svg width="12" height="12" fill="white" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </button>`;
    div.addEventListener('click', () => playSong(t, list, idx));
    return div;
  }

  function makeHeroCard(t, list, idx) {
    const div = document.createElement('div');
    div.className = 'hero-card';
    div.innerHTML = `
      <img src="${t.album?.cover_big||t.album?.cover_medium||''}" alt="" loading="lazy"/>
      <div class="hero-card-body">
        <div class="hero-card-title">${t.title}</div>
        <div class="hero-card-sub">${t.artist?.name||''}</div>
      </div>
      <div class="play-overlay">
        <div class="play-circle">
          <svg width="18" height="18" fill="white" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </div>
      </div>`;
    div.addEventListener('click', () => playSong(t, list, idx));
    return div;
  }

  async function loadChart() {
    document.getElementById('trending-hero').innerHTML = '<div class="loading"><div class="spinner"></div><span>Loading…</span></div>';
    document.getElementById('track-list').innerHTML = '<div class="loading"><div class="spinner"></div><span>Loading…</span></div>';
    document.getElementById('songs-title').innerHTML = 'Top <em>Songs</em>';
    try {
      const tracks = await itunesTop('', 25);
      if (!tracks.length) throw new Error('empty');

      const heroEl = document.getElementById('trending-hero');
      heroEl.innerHTML = '';
      tracks.slice(0,3).forEach((t,i) => heroEl.appendChild(makeHeroCard(t, tracks, i)));

      const listEl = document.getElementById('track-list');
      listEl.innerHTML = '';
      listEl._all = tracks;
      listEl._shown = 12;
      tracks.slice(0,12).forEach((t,i) => listEl.appendChild(makeTrackItem(t, tracks, i)));
    } catch(e) {
      document.getElementById('trending-hero').innerHTML = '<p style="color:var(--muted);padding:20px">Could not load. Please refresh.</p>';
      document.getElementById('track-list').innerHTML = '';
    }
  }

  function loadMoreTracks() {
    const listEl = document.getElementById('track-list');
    const all = listEl._all || [];
    const shown = listEl._shown || 12;
    const next = Math.min(shown + 8, all.length);
    for (let i = shown; i < next; i++) listEl.appendChild(makeTrackItem(all[i], all, i));
    listEl._shown = next;
  }

  /* Artists: load popular Indian + global artists */
  const FEATURED_ARTISTS = ['Arijit Singh','Shreya Ghoshal','Taylor Swift','The Weeknd','Badshah','Dua Lipa','AP Dhillon','Drake'];

  async function loadArtists() {
    const row = document.getElementById('artist-row');
    row.innerHTML = '';
    for (const name of FEATURED_ARTISTS) {
      try {
        const r = await fetch(`${ITUNES}/search?term=${encodeURIComponent(name)}&entity=musicArtist&limit=1`);
        const j = await r.json();
        const a = j.results?.[0];
        if (!a) continue;
        const img = (await itunesSearch(name, 1))[0]?.album?.cover_medium || '';
        const div = document.createElement('div');
        div.className = 'artist-card';
        div.innerHTML = `<img src="${img}" alt="${name}" loading="lazy"/><p>${name}</p>`;
        div.addEventListener('click', () => searchArtist(name));
        row.appendChild(div);
      } catch(e) {}
    }
    if (!row.children.length) row.innerHTML = '<p style="color:var(--muted);padding:20px">Could not load artists.</p>';
  }

  /* Albums: search popular albums */
  const FEATURED_ALBUMS = ['Animal Bollywood','Stree 2','Midnights Taylor Swift','After Hours Weeknd','Diljit Dosanjh Ghost'];

  async function loadAlbums() {
    const grid = document.getElementById('album-grid');
    grid.innerHTML = '';
    for (const q of FEATURED_ALBUMS) {
      try {
        const r = await fetch(`${ITUNES}/search?term=${encodeURIComponent(q)}&entity=album&limit=1&media=music`);
        const j = await r.json();
        const al = j.results?.[0];
        if (!al) continue;
        const div = document.createElement('div');
        div.className = 'album-card';
        const art = (al.artworkUrl100||'').replace('100x100','300x300');
        div.innerHTML = `
          <img src="${art}" alt="${al.collectionName}" loading="lazy"/>
          <div class="album-card-info">
            <div class="album-card-name">${al.collectionName}</div>
            <div class="album-card-artist">${al.artistName}</div>
          </div>`;
        div.addEventListener('click', () => loadAlbumTracks(al));
        grid.appendChild(div);
      } catch(e) {}
    }
    if (!grid.children.length) grid.innerHTML = '<p style="color:var(--muted);padding:20px">Could not load albums.</p>';
  }

  async function loadAlbumTracks(album) {
    try {
      toast(`Loading ${album.collectionName||album.title}…`);
      const r = await fetch(`${ITUNES}/lookup?id=${album.collectionId||album.id}&entity=song`);
      const j = await r.json();
      const tracks = (j.results||[]).filter(x=>x.wrapperType==='track'&&x.previewUrl).map(normalize);
      const listEl = document.getElementById('track-list');
      listEl.innerHTML = '';
      listEl._all = tracks;
      listEl._shown = tracks.length;
      tracks.forEach((t,i) => listEl.appendChild(makeTrackItem(t, tracks, i)));
      document.getElementById('songs-title').innerHTML = `<em>${album.collectionName||album.title}</em>`;
      document.getElementById('sec-songs').scrollIntoView({behavior:'smooth'});
    } catch(e) { toast('Could not load album tracks.'); }
  }

  async function searchArtist(name) {
    try {
      toast(`Loading ${name}…`);
      const tracks = await itunesSearch(name, 25);
      const listEl = document.getElementById('track-list');
      listEl.innerHTML = '';
      listEl._all = tracks;
      listEl._shown = tracks.length;
      tracks.forEach((t,i) => listEl.appendChild(makeTrackItem(t, tracks, i)));
      document.getElementById('songs-title').innerHTML = `Songs by <em>${name}</em>`;
      document.getElementById('sec-songs').scrollIntoView({behavior:'smooth'});
    } catch(e) { toast('Could not load artist tracks.'); }
  }

  let searchTimer;
  document.getElementById('search-input').addEventListener('input', e => {
    clearTimeout(searchTimer);
    const q = e.target.value.trim();
    if (!q) { loadChart(); return; }
    searchTimer = setTimeout(async () => {
      try {
        const tracks = await itunesSearch(q, 25);
        const heroEl = document.getElementById('trending-hero');
        heroEl.innerHTML = '';
        tracks.slice(0,3).forEach((t,i) => heroEl.appendChild(makeHeroCard(t, tracks, i)));
        const listEl = document.getElementById('track-list');
        listEl.innerHTML = '';
        listEl._all = tracks;
        listEl._shown = tracks.length;
        tracks.forEach((t,i) => listEl.appendChild(makeTrackItem(t, tracks, i)));
        document.getElementById('songs-title').innerHTML = `Results for <em>"${q}"</em>`;
      } catch(e) { toast('Search failed. Try again.'); }
    }, 500);
  });

  loadChart();
  loadArtists();
  loadAlbums();
</script>
</body>
</html>
